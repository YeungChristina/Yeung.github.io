<!DOCTYPE html>
<html>
<head>
    <title>我的第一個網頁</title>
    <style>
        body {
            font-family: 標楷體, 微軟正黑體, sans-serif;
            background: linear-gradient(135deg, #ffdde1, #f8c3d2);
            text-align: center;
            padding: 30px;
        }
        h1 {
            background-color: white;
            color: #ff6f91;
            padding: 20px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 5px 5px 15px rgba(255, 111, 145, 0.3);
        }
        .box {
            background-color: rgba(255, 255, 255, 0.8);
            margin: 30px auto;
            padding: 25px;
            width: 80%;
            max-width: 500px;
            border-radius: 30px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1);
            border: 3px solid white;
        }
        img {
            width: 200px;
            border-radius: 50%;
            border: 5px solid #ffb6c1;
        }
        .button {
            background-color: #ff6f91;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 40px;
            display: inline-block;
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
        .button:hover {
            background-color: #ff3b6f;
        }
    </style>
</head>
<body>

    <h1>✨ 歡迎來到我的小小世界 ✨</h1>

    <div class="box">
        <h2>關於我</h2>
        <!-- 這裡可以放你的照片（把圖片和這個檔案放在同一個資料夾） -->
        <img src="Lion.jpg" alt="我的照片">
        <p>你好！我是 <strong>Christina Yeung</strong></p>
        <p>我今年 11 歲，我喜歡畫畫、聽音樂</p>
        <p>我最喜歡的動物是小狗 🐶</p>
    </div>

    <div class="box">
        <h2>我的願望</h2>
        <p>⭐ 我想學會自己製作遊戲</p>
        <p>⭐ 我想去日本看富士山</p>
        <p>⭐ 我想交到更多好朋友</p>
    </div>

    <a href="#" class="button">💌 寫信給我: Christina@hotmail.com </a>

</body>
</html>
